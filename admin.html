<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - OKLOO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="admin-body">

    <!-- Login Screen -->
    <div class="login-screen" id="login-screen">
        <div class="login-container">

            <div class="login-brand">
                <h1>OKLOO</h1>
                <p>Oasis of Hope</p>
            </div>

            <form id="login-form" class="login-form">
                <h2>Admin Login</h2>

                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required placeholder="admin@example.com">
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="Enter password">
                </div>

                <div class="form-error hidden" id="login-error"></div>

                <button type="submit" class="btn btn-primary btn-full">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader hidden"></span>
                </button>
            </form>

            <a href="index.html" class="back-link">Back to Website</a>

        </div>
    </div>

    <!-- Admin Dashboard -->
    <div class="admin-dashboard hidden" id="admin-dashboard">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>OKLOO Admin</h2>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-section="overview">Overview</button>
                <button class="nav-item" data-section="media">Media Gallery</button>
                <button class="nav-item" data-section="donations">Donations</button>
                <button class="nav-item" data-section="messages">Messages</button>
                <button class="nav-item" data-section="settings">Settings</button>
            </nav>

            <div class="sidebar-footer">
                <button id="logout-btn" class="btn-logout">Logout</button>
            </div>
        </aside>

        <!-- Main -->
        <main class="admin-main">

            <!-- Overview -->
            <section class="admin-section active" id="section-overview">
                <h1>Dashboard Overview</h1>

                <div class="stats-grid">
                    <div class="stat-card">
                        <span id="admin-communities">0</span>
                        <p>Communities</p>
                    </div>

                    <div class="stat-card">
                        <span id="admin-donors">0</span>
                        <p>Donors</p>
                    </div>

                    <div class="stat-card">
                        <span id="admin-funds">KES 0</span>
                        <p>Funds</p>
                    </div>
                </div>
            </section>

            <!-- Media -->
            <section class="admin-section" id="section-media"></section>

            <!-- Donations -->
            <section class="admin-section" id="section-donations"></section>

            <!-- Messages -->
            <section class="admin-section" id="section-messages"></section>

            <!-- Settings -->
            <section class="admin-section" id="section-settings">
                <form id="counters-form">
                    <input type="number" id="edit-communities" placeholder="Communities">
                    <input type="number" id="edit-donors" placeholder="Donors">
                    <input type="number" id="edit-funds" placeholder="Funds">
                    <button type="submit">Save</button>
                </form>
            </section>

        </main>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="firebase-config.js"></script>
    <script src="admin.js"></script>

</body>
</html>
